name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPORT: 'true'
      BUILD_MODE: 'true'
      NOTION_PAGE_ID: 0c30a55a6fed4e2c937cffe179ae0810
      NEXT_PUBLIC_LINK: https://tortoiseknightma.github.io/blog
      NEXT_PUBLIC_BASE_PATH: /blog
      NEXT_PUBLIC_HOME_BANNER_IMAGE: https://raw.githubusercontent.com/tortoiseknightma/blog/main/public/images/notion-migrated/site/home-banner.webp
      NEXT_PUBLIC_AVATAR: https://raw.githubusercontent.com/tortoiseknightma/blog/main/public/images/notion-migrated/site/avatar.webp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Yarn
        run: npm install --global yarn@1.22.22

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build static site
        run: yarn export

      - name: Add GitHub Pages marker
        run: touch out/.nojekyll

      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd out
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
